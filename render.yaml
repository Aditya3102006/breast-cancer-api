services:
  # FastAPI backend service
  - type: web
    name: breast-cancer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: APP_API_KEY
        sync: false

  # Streamlit frontend service
  - type: web
    name: breast-cancer-assistant-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: API_URL
        value: https://breast-cancer-api.onrender.com

